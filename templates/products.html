<!DOCTYPE html>
<html lang="en">
    <!-- Start Head -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="../static/products.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">

    <title>Products | Tech Store Prototype</title>
</head>
<!-- End Head -->

<!-- Start Body -->
<body>
    <div class="page">
<!-- Start Header -->
        <header class="navbar">
            <div class="nav-left">
                <button class="menu-button" aria-label="Toggle mobile menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link">Items</a>
            </div>

            <div class="nav-right">
                <a href="#" class="icon-link" aria-label="View Wishlist">♡</a>
                <a href="#" class="nav-link">Cart</a>
                <a href="#" class="cart-icon" aria-label="View Shopping Bag">🛍</a>
                <a href="#" class="icon-link" aria-label="User Profile">♙</a>
            </div>
        </header>
<!-- End Header -->
        <main class="products-layout">
<!-- Products Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-spacer"></div>

                <section class="filter-box" aria-label="Stock availability filters">
                    <div class="filter-header">
                        <span>Status</span>
                        <span>⌃</span>
                    </div>

                    <label class="checkbox-row">
                        <input type="checkbox" data-stock-filter="available">
                        <span>In Stock</span>
                        <small>(450)</small>
                    </label>

                    <label class="checkbox-row">
                        <input type="checkbox" data-stock-filter="out">
                        <span>Out Of Stock</span>
                        <small>(18)</small>
                    </label>
                </section>

                <ul class="category-menu">
                    <li><button class="category-filter active" data-filter="all">All Items <span>&gt;</span></button></li>
                    <li><button class="category-filter" data-filter="ram">RAM <span>&gt;</span></button></li>
                    <li><button class="category-filter" data-filter="cases">Cases <span>&gt;</span></button></li>
                    <li><button class="category-filter" data-filter="cpu-gpu">CPU/GPU <span>&gt;</span></button></li>
                    <li><button class="category-filter" data-filter="pc-components">Components <span>&gt;</span></button></li>
                    <li><button class="category-filter" data-filter="mice-keyboards">Peripherals <span>&gt;</span></button></li>
                    <li><button class="category-filter" data-filter="monitors">Monitors <span>&gt;</span></button></li>
                </ul>
            </aside>
<!-- End Products Sidebar -->
<!-- Start Products Grid -->
            <section class="products-main">
                <div class="search-bar">
                    <span class="search-icon">⌕</span>
                    <input class="product-search" type="text" placeholder="Search for hardware..." aria-label="Search products">
                </div>

                <div class="product-grid">
                    <article class="product-card" data-category="cpu-gpu" data-stock="available">
                        <div class="product-image">
                            <img src="{{ url_for('static', filename='images/GeForce5060tipny.png') }}" alt="High-end RTX 4090 Graphics Card">
                            <button class="add-button" aria-label="Add RTX 4090 to cart">+</button>
                        </div>
                        <div class="product-info">
                            <p>RTX 4090 Graphics Card</p>
                            <strong>$199</strong>
                        </div>
                    </article>
                    <article class="product-card" data-category="cpu-gpu" data-stock="available">
                        <div class="product-image">
                            <img src="{{ url_for('static', filename='images/SapphireNitro+.png') }}" alt="High-end RTX 4090 Graphics Card">
                            <button class="add-button" aria-label="Add RTX 4090 to cart">+</button>
                        </div>
                        <div class="product-info">
                            <p>Sapphire Nitro+ RX 9070XT Graphics Card</p>
                            <strong>$199</strong>
                        </div>
                    </article>                    

                    <article class="product-card" data-category="ram" data-stock="available">
                        <div class="product-image">
                            <img src="{{ url_for('static', filename='images/SapphireNitro+.png') }}" alt="32GB DDR5 Corsair RAM">
                            <button class="add-button" aria-label="Add Corsair RAM to cart">+</button>
                        </div>
                        <div class="product-info">
                            <p>Corsair 32GB RAM</p>
                            <strong>$89</strong>
                        </div>
                    </article>

                    <article class="product-card" data-category="cases" data-stock="available">
                        <div class="product-image">
                            <img src="{{ url_for('static', filename='images/SapphireNitro+.png') }}" alt="Gaming PC Case with glass panel">
                            <button class="add-button" aria-label="Add Gaming Case to cart">+</button>
                        </div>
                        <div class="product-info">
                            <p>Gaming PC Case</p>
                            <strong>$129</strong>
                        </div>
                    </article>

                    <article class="product-card" data-category="pc-components" data-stock="available">
                        <div class="product-image">
                            <img src="{{ url_for('static', filename='images/SapphireNitro+.png') }}" alt="750W Modular Power Supply">
                            <button class="add-button" aria-label="Add 750W Power Supply to cart">+</button>
                        </div>
                        <div class="product-info">
                            <p>750W Power Supply</p>
                            <strong>$99</strong>
                        </div>
                    </article>

                    <article class="product-card" data-category="mice-keyboards" data-stock="available">
                        <div class="product-image">
                            <img src="{{ url_for('static', filename='images/SapphireNitro+.png') }}" alt="RGB Mechanical Keyboard">
                            <button class="add-button" aria-label="Add Mechanical Keyboard to cart">+</button>
                        </div>
                        <div class="product-info">
                            <p>Mechanical Keyboard</p>
                            <strong>$119</strong>
                        </div>
                    </article>

                    <article class="product-card" data-category="monitors" data-stock="out">
                        <div class="product-image">
                            <img src="{{ url_for('static', filename='images/SapphireNitro+.png') }}" alt="4K Gaming Monitor">
                            <button class="add-button" aria-label="Add Monitor to cart">+</button>
                        </div>
                        <div class="product-info">
                            <p>Gaming Monitor (Out of Stock)</p>
                            <strong>$249</strong>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </div>
<!-- End of products grid -->
<!-- Products JS linkage --> 
    <script src="../static/js/products.js"></script>
</body>
<!-- End of body -->
</html>
